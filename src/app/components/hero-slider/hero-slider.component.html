<section id="home" class="hero-slider" (mouseenter)="onMouseEnter()" (mouseleave)="onMouseLeave()">
  <!-- Logo Background -->
  <div class="logo-display">
    <img src="assets/images/logo.jpg" alt="VSSEnterprises Logo" class="hero-logo float-anim">
  </div>

  <div class="slides-container">
    <div *ngFor="let slide of slides; let i = index"
         class="slide"
         [class.active]="i === currentSlide"
         [attr.data-slide]="i"
         [style.backgroundImage]="'url(' + slide.image + ')'">

      <div class="slide-overlay"></div>

      <div class="slide-content">

        <!-- Badge -->
        <!-- <div class="slide-badge">{{ slide.badge }}</div> -->

        <!-- Title with highlighted word -->
        <h1 class="slide-title">
          {{ slide.title }}<br>
          <span class="slide-highlight">{{ slide.highlight }}</span>
        </h1>

        <!-- Divider line -->
        <div class="slide-divider"></div>

        <!-- Subtitle -->
        <p class="slide-subtitle">{{ slide.subtitle }}</p>

        <!-- CTA Buttons -->
        <div class="slide-buttons">
          <a routerLink="/contact" class="btn-primary">
            {{ slide.cta }} <i class="fas fa-arrow-right"></i>
          </a>
          <a routerLink="/services" class="btn-secondary">
            Our Services
          </a>
        </div>

      </div>
    </div>
  </div>

  <!-- Navigation Arrows -->
  <button class="arrow arrow-prev fadeInLeft" (click)="prevSlide()" aria-label="Previous slide">
    <i class="fas fa-chevron-left"></i>
  </button>
  <button class="arrow arrow-next fadeInRight" (click)="nextSlide()" aria-label="Next slide">
    <i class="fas fa-chevron-right"></i>
  </button>

  <!-- Slide Indicators -->
  <div class="slide-indicators fadeInUp">
    <button *ngFor="let slide of slides; let i = index"
            class="indicator"
            [class.active]="i === currentSlide"
            (click)="goToSlide(i)"
            [attr.aria-label]="'Go to slide ' + (i + 1)">
    </button>
  </div>
</section>
<app-services [limit]="4" [showSeeMore]="true"></app-services>
<app-testimonials></app-testimonials>
<app-testimonial-form></app-testimonial-form>
